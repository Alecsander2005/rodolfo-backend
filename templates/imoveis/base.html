<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Imóveis</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }

      body {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f4f6f9;
        color: #1f2937;
        margin: 0;
      }
      .page {
        min-height: 100vh;
      }
      .header {
        background: white;
        padding: 24px;
        border-bottom: 1px solid #e5e7eb;
      }
      .container {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0;
      }
      .card {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
      }
      a.button,
      button,
      input[type="submit"] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 999px;
        padding: 12px 18px;
        border: none;
        background: #059669;
        color: white;
        cursor: pointer;
        text-decoration: none;
        font-weight: 600;
        transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      }
      a.button:hover,
      button:hover,
      input[type="submit"]:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 32px rgba(15, 23, 42, 0.08);
      }
      a.button.secondary {
        background: #e5e7eb;
        color: #111827;
      }
      a.button.secondary:hover {
        background: #d6d8db;
      }
      .small-button {
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.85rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid #e5e7eb;
        vertical-align: middle;
      }
      th {
        text-align: left;
        color: #374151;
        font-size: 0.95rem;
        font-weight: 700;
      }
      td {
        color: #374151;
        font-size: 0.95rem;
      }
      .table-image {
        width: 80px;
        height: 60px;
        object-fit: cover;
        border-radius: 14px;
      }
      .table-responsive {
        width: 100%;
        overflow-x: auto;
      }
      .form-grid {
        display: grid;
        gap: 16px;
      }
      .form-grid.two-cols {
        grid-template-columns: 1fr 1fr;
      }
      .image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 16px;
      }
      .image-card {
        background: #f8fafc;
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        overflow: hidden;
        display: grid;
        gap: 10px;
        padding: 10px;
      }
      .image-card img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        border-radius: 16px;
      }
      .image-card form {
        margin: 0;
      }
      label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 8px;
        color: #374151;
      }
      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 0.95rem;
        color: #111827;
        background: #f9fafb;
        outline: none;
      }
      input:focus,
      textarea:focus,
      select:focus {
        border-color: #10b981;
        background: white;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #d1fae5;
        color: #166534;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 0.85rem;
      }
      .notice {
        background: #f8fafc;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 24px;
      }
      .footer {
        text-align: center;
        color: #6b7280;
        font-size: 0.9rem;
        margin-top: 40px;
      }

      @media (max-width: 960px) {
        .container {
          width: min(100%, calc(100% - 32px));
          padding: 20px 0;
        }

        .card {
          padding: 20px;
        }

        .form-grid.two-cols {
          grid-template-columns: 1fr;
        }

        .header {
          padding: 20px 16px;
        }

        .header .container {
          gap: 14px;
        }

        th,
        td {
          padding: 10px 12px;
        }

        .table-image {
          width: 64px;
          height: 48px;
        }
      }

      @media (max-width: 680px) {
        .header {
          padding: 18px 12px;
        }

        .header .container {
          flex-direction: column;
          align-items: stretch;
        }

        .header h1 {
          font-size: 1.6rem;
        }

        .button,
        input[type="submit"] {
          width: 100%;
        }

        .button.secondary {
          width: 100%;
        }

        .form-grid {
          gap: 14px;
        }

        .notice {
          padding: 14px;
        }

        .table-responsive {
          overflow-x: auto;
        }

        .table-responsive table,
        .table-responsive thead,
        .table-responsive tbody,
        .table-responsive th,
        .table-responsive td,
        .table-responsive tr {
          display: block;
        }

        .table-responsive thead tr {
          position: absolute;
          top: -9999px;
          left: -9999px;
        }

        .table-responsive tr {
          margin-bottom: 18px;
          border: 1px solid #e5e7eb;
          border-radius: 20px;
          padding: 14px 12px;
          background: white;
        }

        .table-responsive td {
          border: none;
          position: relative;
          padding-left: 52%;
          text-align: left;
          white-space: normal;
        }

        .table-responsive td:before {
          content: attr(data-label);
          position: absolute;
          top: 14px;
          left: 14px;
          width: calc(50% - 28px);
          white-space: nowrap;
          font-weight: 700;
          color: #374151;
        }

        .table-responsive td[data-label=""]:before {
          content: '';
        }

        .table-responsive td img {
          max-width: 100%;
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;">
          <div>
            <p style="margin:0; font-size:0.95rem; color:#10b981; text-transform:uppercase; letter-spacing:1px;">Painel Admin</p>
            <h1 style="margin:8px 0 0; font-size:2rem;">RODOLFO IMÓVEIS</h1>
          </div>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <a href="{% url 'imovel_list' %}" class="button secondary">Lista de imóveis</a>
            <a href="{% url 'imovel_create' %}" class="button">Novo imóvel</a>
          </div>
        </div>
      </header>

      <main class="container">
        <div class="card">
          {% block content %}{% endblock %}
        </div>
      </main>

      <footer class="footer">
        Desenvolvido por Mateus Moreira e Petrus Alecsander.
      </footer>
    </div>
  </body>
</html>
