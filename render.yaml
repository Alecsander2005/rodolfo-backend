services:
  - type: web
    name: rodolfo-backend
    env: python
    region: oregon
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.10"
